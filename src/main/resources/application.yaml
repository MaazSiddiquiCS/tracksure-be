spring:
  devtools:
    livereload:
      enabled: false
    restart:
      enabled: false
  application:
    name: tracksure-be
  flyway:
    enabled: false
  datasource:
    url: jdbc:postgresql://localhost:5432/tracksure
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      idle-timeout: 30000
      connection-timeout: 20000 # Good practice to add a timeout
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        # Crucial for PostGIS support
        dialect: org.hibernate.spatial.dialect.postgis.PostgisPG95Dialect
        default_batch_fetch_size: 25
        order_updates: true
        order_inserts: true
        jdbc:
          batch_size: 50
    show-sql: true # Turn off for performance; use logging levels instead
  config:
    import: "optional:file:.env[.properties]"

debug: false

logging:
  level:
    org.hibernate.SQL: DEBUG # Only shows SQL when you need to debug
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE # Shows parameter values

server:
  port: 8080
  address: 0.0.0.0

app:
  jwt:
    # Use env var if present; otherwise fall back to a deterministic dev-only secret.
    # IMPORTANT: set JWT_SECRET in real environments.
    secret: ${JWT_SECRET:DEV_ONLY_CHANGE_ME_DEV_ONLY_CHANGE_ME_DEV_ONLY_CHANGE_ME}
    expiration-ms: 86400000        # 24 hours
    refresh-expiration-ms: 604800000  # 7 days